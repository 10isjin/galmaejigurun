<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 갈매지구런 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&family=Nanum+Gothic+Coding:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height:100%; overflow:hidden; font-family:'Gaegu',cursive; background:#f0f7f2; color:#1a3a24; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:11px 36px; background:#fff; border-bottom:2px solid #c8e8d0; flex-shrink:0; box-shadow:0 2px 12px rgba(30,100,60,0.07); }
.logo { font-family:'Jua',sans-serif; font-size:28px; color:#1e7a40; }
.topbar-right { display:flex; align-items:center; gap:16px; }
.date-txt { font-family:'Nanum Gothic Coding',monospace; font-size:13px; color:#5a8a6a; }
.live-pill { display:flex; align-items:center; gap:7px; background:#e6f5eb; border:1.5px solid #5ec87a; border-radius:100px; padding:5px 16px; font-family:'Nanum Gothic Coding',monospace; font-size:13px; color:#1e7a40; font-weight:700; }
.live-dot { width:8px; height:8px; border-radius:50%; background:#2ec858; animation:pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(46,200,88,0.5);} 50%{box-shadow:0 0 0 6px rgba(46,200,88,0);} }
#app { height:100vh; display:flex; flex-direction:column; }
.main { flex:1; display:grid; grid-template-columns:380px 1fr; overflow:hidden; min-height:0; }
.left { background:#fff; border-right:2px solid #c8e8d0; padding:18px 24px; display:flex; flex-direction:column; gap:14px; overflow:hidden; }
.earth-wrap { display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
.ring-container { position:relative; width:186px; height:186px; }
.earth-svg { width:100%; height:100%; transform:rotate(-90deg); }
.earth-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; }
.earth-icon { font-size:52px; line-height:1; display:block; animation:spin 22s linear infinite; }
@keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
.pct-num { font-family:'Jua',sans-serif; font-size:22px; color:#1e7a40; display:block; margin-top:3px; }
.pct-label { font-size:14px; color:#7aaa8a; }
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; flex-shrink:0; }

.scard-num { font-family:'Jua',sans-serif; font-size:26px; line-height:1; margin-bottom:2px; }
.scard-label { font-size:13px; color:#5a8a6a; }
.green{color:#1e7a40;} .blue{color:#1a6aaa;} .amber{color:#c87a10;} .red{color:#c83a2a;}
.prog-section { flex-shrink:0; }
.prog-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.prog-title { font-family:'Jua',sans-serif; font-size:16px; color:#1a3a24; }
.prog-remain { font-family:'Nanum Gothic Coding',monospace; font-size:11px; color:#7aaa8a; }
.prog-bg { height:15px; background:#ddf0e4; border-radius:100px; overflow:hidden; }
.prog-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,#1e7a40,#4ec87a,#8ae8aa); position:relative; transition:width 2.2s cubic-bezier(0.22,1,0.36,1); }
.prog-fill::after { content:''; position:absolute; right:0; top:0; bottom:0; width:40px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5)); animation:shim 2s ease-in-out infinite; }
@keyframes shim { 0%,100%{opacity:0;} 50%{opacity:1;} }
.prog-ticks { display:flex; justify-content:space-between; margin-top:4px; font-family:'Nanum Gothic Coding',monospace; font-size:9px; color:#9aca9a; }
.class-section { flex-shrink:0; }
.class-section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.class-section-title { font-family:'Jua',sans-serif; font-size:16px; color:#1a3a24; }
.class-all-btn { font-family:'Gaegu',cursive; font-size:13px; color:#1e7a40; background:#e6f5eb; border:1.5px solid #a0d8b0; border-radius:100px; padding:3px 12px; cursor:pointer; transition:background 0.15s; }
.class-all-btn:hover { background:#c8ecda; }
.class-top3 { display:flex; flex-direction:column; gap:7px; }
.mobile-top-row { display:contents; }
.class-mini { display:grid; grid-template-columns:36px 1fr auto; align-items:center; gap:10px; padding:9px 14px; border-radius:14px; border:1.5px solid #e0f0e6; background:#f5fbf6; transition:background 0.15s, box-shadow 0.15s; }
.class-mini:hover { background:#e6f5eb; box-shadow:0 2px 8px rgba(30,100,60,0.09); }
.class-mini.c1 { background:#f8f5e6; border-color:#d8c060; }
.class-mini.c2 { background:#f2f5fb; border-color:#a8c0dc; }
.class-mini.c3 { background:#f8f2ec; border-color:#d0a878; }
.cm-rk { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Jua',sans-serif; font-size:14px; background:#e0f0e6; color:#5a8a6a; flex-shrink:0; }
.cm-rk.r1 { background:#fde88a; color:#a07010; }
.cm-rk.r2 { background:#dce8f5; color:#3a6a9a; }
.cm-rk.r3 { background:#f5e0c8; color:#9a6030; }
.cm-name { font-family:'Jua',sans-serif; font-size:15px; color:#1a3a24; }
.cm-meta { font-size:12px; color:#7aaa8a; }
.cm-km { font-family:'Jua',sans-serif; font-size:16px; color:#1e7a40; white-space:nowrap; }
.cm-km span { font-size:12px; color:#9aca9a; }
.right { padding:20px 24px; display:flex; flex-direction:column; overflow:hidden; min-height:0; background:#f5fbf6; }
.right-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-shrink:0; }
.right-title { font-family:'Jua',sans-serif; font-size:22px; color:#1a3a24; display:flex; align-items:center; gap:10px; }
.right-title-badge { font-family:'Nanum Gothic Coding',monospace; font-size:13px; color:#7aaa8a; font-weight:400; }
.filter-tabs { display:flex; gap:4px; background:#e0f0e6; border-radius:12px; padding:4px; flex-shrink:0; margin-bottom:10px; }
.ftab { padding:5px 15px; border:none; border-radius:9px; font-family:'Gaegu',cursive; font-size:15px; cursor:pointer; background:transparent; color:#5a8a6a; transition:all 0.18s; }
.ftab.on { background:#1e7a40; color:#fff; }
.search-wrap { position:relative; flex-shrink:0; margin-bottom:10px; }
.search-input { width:100%; padding:11px 46px 11px 18px; border-radius:14px; border:2px solid #c8e8d0; background:#fff; color:#1a3a24; font-family:'Jua',sans-serif; font-size:17px; outline:none; transition:border-color 0.2s, box-shadow 0.2s; }
.search-input::placeholder { color:#b0d0ba; }
.search-input:focus { border-color:#2ec858; box-shadow:0 0 0 3px rgba(46,200,88,0.15); }
.search-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:18px; pointer-events:none; opacity:0.4; }
.search-dropdown { position:absolute; top:calc(100% + 5px); left:0; right:0; background:#fff; border:1.5px solid #c8e8d0; border-radius:14px; overflow:hidden; z-index:100; display:none; box-shadow:0 8px 24px rgba(30,100,60,0.13); }
.search-dropdown.show { display:block; }
.sd-item { display:flex; align-items:center; justify-content:space-between; padding:11px 18px; cursor:pointer; transition:background 0.15s; border-bottom:1px solid #e8f5ec; }
.sd-item:last-child { border-bottom:none; }
.sd-item:hover { background:#e6f5eb; }
.sd-name { font-family:'Jua',sans-serif; font-size:17px; color:#1a3a24; }
.sd-sub { font-size:12px; color:#7aaa8a; margin-left:6px; }
.sd-rank { font-family:'Nanum Gothic Coding',monospace; font-size:13px; color:#1e7a40; font-weight:700; }
.lb-wrap { flex:1; overflow-y:auto; min-height:0; padding-right:4px; }
.lb-wrap::-webkit-scrollbar { width:5px; }
.lb-wrap::-webkit-scrollbar-thumb { background:#c8e8d0; border-radius:3px; }
.runner { display:grid; grid-template-columns:42px 1fr auto; align-items:center; gap:11px; padding:11px 15px; border-radius:15px; border:1.5px solid #e0f0e6; background:#fff; margin-bottom:7px; transition:background 0.18s,border-color 0.18s,box-shadow 0.18s; }
.runner:hover { background:#e6f5eb; border-color:#5ec87a; box-shadow:0 2px 8px rgba(30,100,60,0.09); }
.runner.g1 { background:#fffdf0; border-color:#d8c060; }
.runner.g2 { background:#f5f8ff; border-color:#a8c0dc; }
.runner.g3 { background:#fdf5ee; border-color:#d0a878; }
.rk { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Jua',sans-serif; font-size:16px; background:#e0f0e6; color:#5a8a6a; flex-shrink:0; }
.rk.k1 { background:#fde88a; color:#a07010; }
.rk.k2 { background:#dce8f5; color:#3a6a9a; }
.rk.k3 { background:#f5e0c8; color:#9a6030; }
.r-name { font-family:'Jua',sans-serif; font-size:17px; color:#1a3a24; margin-bottom:2px; display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.r-sub { font-size:12px; color:#9aca9a; font-family:'Gaegu',cursive; }
.r-tag { display:inline-block; font-size:12px; padding:1px 9px; border-radius:100px; font-family:'Gaegu',cursive; }
.tag-s { background:#e0f5e6; color:#1e7a40; border:1px solid #a0d8b0; }
.tag-t { background:#e0eef8; color:#1a6aaa; border:1px solid #a0c0e0; }
.tag-p { background:#fff5e0; color:#c87a10; border:1px solid #e8c870; }
.tag-c { background:#f5ede0; color:#9a6030; border:1px solid #ddb888; }
.r-dist-wrap { text-align:right; flex-shrink:0; }
.r-dist { font-family:'Jua',sans-serif; font-size:20px; color:#1e7a40; line-height:1; }
.r-dist-lbl { font-size:11px; color:#9aca9a; }
.r-bar-row { grid-column:1/-1; height:3px; background:#e0f0e6; border-radius:100px; overflow:hidden; margin-top:-4px; }
.r-bar { height:100%; border-radius:100px; background:linear-gradient(90deg,#1e7a40,#4ec87a); }
.bottom-strip { display:flex; align-items:center; justify-content:space-between; padding:6px 36px; border-top:2px solid #c8e8d0; background:#fff; flex-shrink:0; gap:20px; }
.bstrip-item { display:flex; align-items:center; gap:6px; font-size:14px; color:#5a8a6a; white-space:nowrap; }
.bstrip-num { font-family:'Jua',sans-serif; font-size:16px; }
.marquee-wrap { flex:1; overflow:hidden; font-size:14px; color:#2e9a50; }
.marquee-inner { display:inline-block; animation:marquee 28s linear infinite; white-space:nowrap; }
@keyframes marquee { from{transform:translateX(0);} to{transform:translateX(-50%);} }
.overlay { display:none; position:fixed; inset:0; z-index:300; background:rgba(10,40,20,0.38); backdrop-filter:blur(5px); align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.popup-card { background:#fff; border:2.5px solid #4ec87a; border-radius:26px; padding:36px 40px 32px; text-align:center; min-width:320px; max-width:440px; width:90%; position:relative; box-shadow:0 20px 60px rgba(10,60,30,0.15); animation:popIn 0.28s cubic-bezier(0.22,1,0.36,1); }
@keyframes popIn { from{transform:scale(0.84);opacity:0;} to{transform:scale(1);opacity:1;} }
.pop-close { position:absolute; top:14px; right:14px; background:#f0f7f2; border:1.5px solid #c8e8d0; border-radius:50%; width:32px; height:32px; color:#5a8a6a; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
.pop-close:hover { background:#ddf0e4; }
.pr-label { font-size:15px; color:#7aaa8a; margin-bottom:2px; }
.pr-rank { font-family:'Jua',sans-serif; font-size:76px; line-height:1; color:#1e7a40; margin-bottom:2px; }
.pr-rank span { font-size:34px; color:#5a8a6a; }
.pr-name { font-family:'Jua',sans-serif; font-size:28px; color:#1a3a24; margin-bottom:6px; }
.pr-meta { font-size:14px; color:#7aaa8a; margin-bottom:14px; display:flex; align-items:center; justify-content:center; gap:6px; }
.pr-divider { width:70px; height:2px; background:#ddf0e4; margin:0 auto 14px; border-radius:2px; }
.pr-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.pr-stat { background:#f0f7f2; border:1.5px solid #c8e8d0; border-radius:13px; padding:12px; }
.pr-stat-num { font-family:'Jua',sans-serif; font-size:22px; margin-bottom:2px; }
.pr-stat-label { font-size:12px; color:#7aaa8a; }
.pr-msg { font-size:15px; color:#3a6a4a; line-height:1.6; background:#e6f5eb; border-radius:12px; padding:12px 15px; }
.pr-msg strong { color:#1e7a40; }
.class-full-card { background:#fff; border:2.5px solid #4ec87a; border-radius:26px; padding:28px 30px 26px; text-align:left; min-width:340px; max-width:500px; width:92%; position:relative; box-shadow:0 20px 60px rgba(10,60,30,0.15); animation:popIn 0.28s cubic-bezier(0.22,1,0.36,1); max-height:88vh; display:flex; flex-direction:column; }
.cf-title { font-family:'Jua',sans-serif; font-size:21px; color:#1a3a24; margin-bottom:14px; text-align:center; flex-shrink:0; }
.cf-scroll { overflow-y:auto; padding-right:4px; flex:1; min-height:0; }
.cf-scroll::-webkit-scrollbar { width:4px; }
.cf-scroll::-webkit-scrollbar-thumb { background:#c8e8d0; border-radius:2px; }
.cf-row { display:grid; grid-template-columns:38px 1fr auto; align-items:center; gap:10px; padding:10px 14px; border-radius:13px; border:1.5px solid #e0f0e6; background:#f5fbf6; margin-bottom:7px; cursor:pointer; transition:background 0.15s, box-shadow 0.15s; }
.cf-row:hover { background:#e6f5eb; box-shadow:0 2px 8px rgba(30,100,60,0.09); }
.cf-row.c1 { background:#f8f5e6; border-color:#d8c060; }
.cf-row.c2 { background:#f2f5fb; border-color:#a8c0dc; }
.cf-row.c3 { background:#f8f2ec; border-color:#d0a878; }
.cf-rk { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Jua',sans-serif; font-size:14px; background:#e0f0e6; color:#5a8a6a; flex-shrink:0; }
.cf-rk.r1 { background:#fde88a; color:#a07010; }
.cf-rk.r2 { background:#dce8f5; color:#3a6a9a; }
.cf-rk.r3 { background:#f5e0c8; color:#9a6030; }
.cf-name { font-family:'Jua',sans-serif; font-size:16px; color:#1a3a24; }
.cf-meta { font-size:12px; color:#7aaa8a; }
.cf-km { font-family:'Jua',sans-serif; font-size:17px; color:#1e7a40; text-align:right; white-space:nowrap; }
.cf-km span { font-size:12px; color:#9aca9a; }
.cd-back { font-family:'Gaegu',cursive; font-size:14px; color:#5a8a6a; background:#f0f7f2; border:1.5px solid #c8e8d0; border-radius:100px; padding:4px 14px; cursor:pointer; margin-bottom:10px; transition:background 0.15s; display:inline-block; flex-shrink:0; }
.cd-back:hover { background:#ddf0e4; }
.cd-title { font-family:'Jua',sans-serif; font-size:22px; color:#1a3a24; margin-bottom:4px; text-align:center; flex-shrink:0; }
.cd-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:12px 0; flex-shrink:0; }
.cd-stat { background:#f0f7f2; border:1.5px solid #c8e8d0; border-radius:12px; padding:10px; text-align:center; }
.cd-stat-num { font-family:'Jua',sans-serif; font-size:20px; margin-bottom:1px; }
.cd-stat-label { font-size:12px; color:#7aaa8a; }
.cd-members { overflow-y:auto; background:#f5fbf6; border-radius:12px; padding:10px 14px; flex:1; min-height:0; }
.cd-members::-webkit-scrollbar { width:4px; }
.cd-members::-webkit-scrollbar-thumb { background:#c8e8d0; }
.cd-member-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid #e0f0e6; font-size:15px; color:#1a3a24; }
.cd-member-row:last-child { border-bottom:none; }
.cd-member-km { font-family:'Nanum Gothic Coding',monospace; font-size:13px; color:#1e7a40; font-weight:700; }

/* ═══════════════════════════════════════════
   모바일 반응형 (768px 이하)
═══════════════════════════════════════════ */
@media (max-width: 768px) {

  /* 전체 레이아웃: 고정높이 해제 → 세로 스크롤 */
  html, body { height:auto; overflow:auto; }
  #app { height:auto; min-height:100vh; }

  /* TOP BAR */
  .topbar { padding:10px 16px; }
  .logo { font-size:22px; }
  .date-txt { display:none; }
  .live-pill { padding:4px 12px; font-size:12px; }

  /* 2분할 → 1열 세로 스택 */
  .main {
    display:flex; flex-direction:column;
    overflow:visible; min-height:0;
  }

  /* 왼쪽 패널 */
  .left {
    border-right:none;
    border-bottom:2px solid #c8e8d0;
    padding:16px;
    overflow:visible;
    gap:12px;
  }

  /* 지구 링 + 스탯 → 가로로 나란히 */
  .mobile-top-row {
    display:flex; align-items:center; gap:14px;
  }
  .earth-wrap { flex-shrink:0; }
  .ring-container { width:130px; height:130px; }
  .earth-icon { font-size:38px; }
  .pct-num { font-size:18px; }
  .pct-label { font-size:13px; }

  /* 스탯 카드: 오른쪽에 2x2 */
  .stats-grid {
    flex:1; grid-template-columns:1fr 1fr;
    gap:7px;
  }
  .scard { padding:8px 10px; border-radius:12px; }
  .scard-num { font-size:20px; }
  .scard-label { font-size:12px; }

  /* 진행 바 */
  .prog-bg { height:12px; }
  .prog-title { font-size:14px; }
  .prog-remain { font-size:10px; }

  /* 학급 TOP3 */
  .class-section-title { font-size:15px; }
  .class-mini { padding:8px 12px; border-radius:12px; }
  .cm-name { font-size:14px; }
  .cm-meta { font-size:11px; }
  .cm-km { font-size:14px; }

  /* 오른쪽 패널 */
  .right {
    padding:16px;
    overflow:visible; min-height:0;
    flex:none;
  }
  .right-header {
    flex-direction:column; align-items:flex-start;
    gap:8px; margin-bottom:10px;
  }
  .right-title { font-size:19px; }

  /* 필터 탭 */
  .filter-tabs { width:100%; }
  .ftab { padding:5px 10px; font-size:14px; flex:1; text-align:center; }

  /* 검색창 */
  .search-input { font-size:15px; padding:10px 40px 10px 16px; }

  /* 리더보드 - 스크롤 없이 전체 표시 */
  .lb-wrap { overflow:visible; flex:none; }

  /* 개인 순위 카드 */
  .runner { padding:10px 12px; gap:9px; border-radius:13px; }
  .rk { width:32px; height:32px; font-size:14px; }
  .r-name { font-size:15px; }
  .r-dist { font-size:18px; }

  /* 하단 스트립 */
  .bottom-strip {
    padding:8px 16px; gap:10px; flex-wrap:wrap;
  }
  .marquee-wrap { order:-1; width:100%; flex:none; }
  .bstrip-item { font-size:13px; }

  /* 팝업 */
  .popup-card { padding:28px 24px 24px; }
  .pr-rank { font-size:64px; }
  .pr-name { font-size:24px; }
  .class-full-card { padding:22px 20px 20px; max-height:92vh; }
}

@media (max-width: 480px) {
  .logo { font-size:20px; }
  .filter-tabs { gap:2px; }
  .ftab { padding:4px 6px; font-size:13px; }
}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">🌍 갈매지구런 2026</div>
    <div class="topbar-right">
      <div class="date-txt">2025.04.22 – 06.22 &nbsp;|&nbsp; D+6 &nbsp;|&nbsp; 56일 남음</div>
      <div class="live-pill"><span class="live-dot"></span>LIVE</div>
    </div>
  </div>
  <div class="main">
    <div class="left">
      <!-- 모바일: 지구링 + 스탯 가로 배치 / 웹: 세로 배치 -->
      <div class="mobile-top-row">
        <div class="earth-wrap">
          <div class="ring-container">
            <svg class="earth-svg" viewBox="0 0 186 186" aria-hidden="true">
              <defs>
                <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#1e7a40"/>

  function getRankInList(r,list){return list.indexOf(r)+1;}

  window.onSearch=function(val){
    const q=val.trim();
    searchDropdown.innerHTML='';
    if(!q){searchDropdown.classList.remove('show');return;}
    const hits=runners.filter(r=>r.name.includes(q));
    if(!hits.length){
      searchDropdown.innerHTML='<div class="sd-item" style="color:#9aca9a;cursor:default;justify-content:center;font-size:15px;">일치하는 이름이 없어요</div>';
      searchDropdown.classList.add('show');return;
    }
    hits.forEach(r=>{
      const rank=runners.indexOf(r)+1;
      const div=document.createElement('div');
      div.className='sd-item';
      div.innerHTML=`<span><span class="sd-name">${maskName(r)}</span><span class="sd-sub">${r.hasClass?r.classKey:r.tag}</span></span><span class="sd-rank">${rank}위 &nbsp; ${r.km.toFixed(1)}km</span>`;
      div.onclick=()=>showPerson(r);
      searchDropdown.appendChild(div);
    });
    searchDropdown.classList.add('show');
  };

  window.onSearchKey=function(e){
    if(e.key==='Enter'){const hit=runners.find(r=>r.name.includes(searchInput.value.trim()));if(hit)showPerson(hit);}
    if(e.key==='Escape')searchDropdown.classList.remove('show');
  };

  function getMsg(rank,total){
    if(rank===1) return '🥇 <strong>현재 1위!</strong> 갈매지구 최강! 계속 달려요!';
    if(rank<=3)  return `🏅 <strong>TOP ${rank}!</strong> 정말 대단해요. 1위까지 얼마 안 남았어요!`;
    if(rank<=Math.ceil(total*.1)) return '🔥 <strong>상위 10%!</strong> 엄청난 페이스예요!';
    if(rank<=Math.ceil(total*.3)) return '💪 <strong>상위 30%!</strong> 꾸준히 달리면 더 올라가요!';
    if(rank<=Math.ceil(total*.5)) return '🏃 중간 이상이에요! 오늘 한 번 더 뛰어봐요!';
    return '✨ 지금 시작해도 늦지 않았어요! 한 걸음이 지구를 돌아요 🌍';
  }

  function showPerson(r){
    const rank=runners.indexOf(r)+1;
    const total=runners.length;
    const topPct=Math.ceil((rank/total)*100);
    searchDropdown.classList.remove('show');searchInput.value='';
    const rankEl=document.getElementById('prRank');
    rankEl.innerHTML=`${rank}<span>위</span>`;
    rankEl.style.color=rank===1?'#c87a10':rank<=3?'#1a6aaa':'#1e7a40';
    document.getElementById('prLabel').textContent='전체 순위';
    document.getElementById('prName').textContent=maskName(r);
    document.getElementById('prTag').innerHTML=`<span class="r-tag ${tagCls[r.tag]||'tag-c'}">${r.tag}</span>`;
    document.getElementById('prSub').textContent=r.hasClass?r.classKey:r.tag;
    document.getElementById('prKm').textContent=r.km.toFixed(1)+' km';
    document.getElementById('prTop').textContent='상위 '+topPct+'%';
    document.getElementById('prMsg').innerHTML=getMsg(rank,total);
    document.getElementById('personOverlay').classList.add('show');
  }

  window.closePerson=e=>{if(e.target===document.getElementById('personOverlay'))document.getElementById('personOverlay').classList.remove('show');};
  window.closePersonBtn=()=>document.getElementById('personOverlay').classList.remove('show');

  function renderClassList(){
    const card=document.getElementById('classFullCard');
    card.innerHTML=`<button class="pop-close" onclick="closeClassFullBtn()">✕</button><div class="cf-title">🏫 학급 전체 순위</div><div class="cf-scroll" id="cfScroll"></div>`;
    const scroll=document.getElementById('cfScroll');
    classData.forEach((c,i)=>{
      const [rkC,rowC]=(rkCls[i]||' ').split(' ');
      const avg=(c.km/c.members.length).toFixed(1);
      const div=document.createElement('div');
      div.className='cf-row '+(rowC||'');
      div.innerHTML=`<div class="cf-rk ${rkC||''}">${i+1}</div><div><div class="cf-name">${c.classKey}</div><div class="cf-meta">👥 ${c.members.length}명 · 평균 ${avg}km</div></div><div class="cf-km">${c.km.toFixed(1)}<span> km</span></div>`;
      div.onclick=()=>renderClassDetail(c,i+1);
      scroll.appendChild(div);
    });
  }

  function renderClassDetail(c,rank){
    const card=document.getElementById('classFullCard');
    const avg=(c.km/c.members.length).toFixed(1);
    const sorted=[...c.members].sort((a,b)=>b.km-a.km);
    card.innerHTML=`<button class="pop-close" onclick="closeClassFullBtn()">✕</button><button class="cd-back" onclick="renderClassListGlobal()">← 목록으로</button><div class="cd-title">${c.classKey} &nbsp; <span style="font-size:20px;color:#7aaa8a">${rank}위</span></div><div class="cd-stats"><div class="cd-stat"><div class="cd-stat-num green">${c.km.toFixed(1)}</div><div class="cd-stat-label">총 km</div></div><div class="cd-stat"><div class="cd-stat-num blue">${c.members.length}명</div><div class="cd-stat-label">참가 인원</div></div><div class="cd-stat"><div class="cd-stat-num amber">${avg}</div><div class="cd-stat-label">1인 평균 km</div></div></div><div style="font-family:'Jua',sans-serif;font-size:15px;color:#5a8a6a;margin-bottom:7px;flex-shrink:0;">참가 학생</div><div class="cd-members">${sorted.map((m,i)=>`<div class="cd-member-row"><span>${i+1}. ${m.name}</span><span class="cd-member-km">${m.km.toFixed(1)} km</span></div>`).join('')}</div>`;
  }

  window.renderClassListGlobal=renderClassList;
  window.openClassFull=()=>{renderClassList();document.getElementById('classFullOverlay').classList.add('show');};
  window.closeClassFull=e=>{if(e.target===document.getElementById('classFullOverlay'))document.getElementById('classFullOverlay').classList.remove('show');};
  window.closeClassFullBtn=()=>document.getElementById('classFullOverlay').classList.remove('show');

  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){document.getElementById('personOverlay').classList.remove('show');document.getElementById('classFullOverlay').classList.remove('show');searchDropdown.classList.remove('show');}
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))searchDropdown.classList.remove('show');});

  const top10=runners.filter(r=>r.km>0).slice(0,10);
  const msgs=top10.map(r=>`🏅 ${maskName(r)}${r.hasClass?' ('+r.classKey+')':''} ${r.km.toFixed(1)}km`).join('   ·   ');
  document.getElementById('marquee').textContent=msgs+'   ·   '+msgs;
})();
</script>
</body>
</html>
